# ============================================================
# Docker Compose — Website Application Infrastructure
# Phase 1 of security-upgrade-plan.md
# ============================================================
# Lệnh khởi động:  docker-compose up -d
# Lệnh dừng:       docker-compose down
# Xem logs:        docker-compose logs -f [service_name]
# Reset hoàn toàn: docker-compose down -v  ← XÓA toàn bộ data!
# ============================================================

services:

  # ─── MySQL 8.4 ──────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: website_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: website_application
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_network

  # ─── MinIO (Object Storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: website_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"   # API endpoint
      - "9001:9001"   # Web console: http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app_network

  # ─── Redis 7 (Cache + Rate Limiting + Session) ────────────────
  redis:
    image: redis:7-alpine
    container_name: website_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app_network

  # ─── PostgreSQL 16 (Keycloak Database) ────────────────────────
  postgres_keycloak:
    image: postgres:16-alpine
    container_name: website_postgres_kc
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_kc_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER} -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app_network

  # ─── Keycloak 24 (Identity & Access Management) ───────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: website_keycloak
    restart: unless-stopped
    command: start-dev --import-realm --health-enabled=true
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_keycloak:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      # Admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # Dev mode settings
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JAVA_OPTS_APPEND: "-Dkeycloak.migration.replace-placeholders=true"
    ports:
      - "8180:8080"   # Admin Console: http://localhost:8180/admin
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres_keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - app_network

  # ─── API Gateway ─────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: website_api_gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SERVICES_FILE_URL=http://file-service:8086
      - SERVICES_USER_URL=http://host.docker.internal:8082
      - SERVICES_PRODUCT_URL=http://host.docker.internal:8082
      - SERVICES_ORDER_URL=http://host.docker.internal:8082
      - SERVICES_PAYMENT_URL=http://host.docker.internal:8082
      - SERVICES_NOTIFICATION_URL=http://host.docker.internal:8082
      - SERVICES_ADMIN_URL=http://host.docker.internal:8082
      - SERVICES_MONOLITH_URL=http://host.docker.internal:8082
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network

  # ─── File Service ────────────────────────────────────────────
  file-service:
    build:
      context: ./file-service
      dockerfile: Dockerfile
    container_name: website_file_service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - APP_BASE_URL=http://localhost:8080
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET_PRODUCT=products-image
      - MINIO_BUCKET_CATEGORY=category-image
      - MINIO_BUCKET_USER=user-image
      - MINIO_BUCKET_BANNER=banner-image
      - MINIO_EXTERNAL_URL=http://localhost:9000
      - MINIO_REGION=us-east-1
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost:8180/realms/ecommerce
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - app_network

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  mysql_data:
    name: website_mysql_data
  minio_data:
    name: website_minio_data
  redis_data:
    name: website_redis_data
  postgres_kc_data:
    name: website_postgres_kc_data

# ─── Networks ─────────────────────────────────────────────────
networks:
  app_network:
    name: website_app_network
    driver: bridge
