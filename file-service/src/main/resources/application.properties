# ============================================================
# SERVER
# ============================================================
server.port=8086
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ============================================================
# OAUTH2 RESOURCE SERVER (KEYCLOAK)
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/ecommerce
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/ecommerce/protocol/openid-connect/certs

# ============================================================
# MINIO / S3 STORAGE
# ============================================================
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket.product=${MINIO_BUCKET_PRODUCT:products-image}
minio.bucket.category=${MINIO_BUCKET_CATEGORY:products-image}
minio.bucket.user=${MINIO_BUCKET_USER:products-image}
minio.bucket.banner=${MINIO_BUCKET_BANNER:products-image}
minio.url.external=${MINIO_EXTERNAL_URL:http://localhost:9000}
minio.region=${MINIO_REGION:us-east-1}

# ============================================================
# MULTIPART LIMITS
# ============================================================
spring.servlet.multipart.max-file-size=4MB
spring.servlet.multipart.max-request-size=4MB
