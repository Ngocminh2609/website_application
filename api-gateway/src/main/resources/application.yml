server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_local_password}

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        # User Service (Auth + Users)
        - id: user-service
          uri: ${SERVICES_USER_URL:http://localhost:8082}
          predicates:
            - Path=/api/auth/**, /api/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # Product Service (Products, Categories, Banners, Reviews)
        - id: product-service
          uri: ${SERVICES_PRODUCT_URL:http://localhost:8082}
          predicates:
            - Path=/api/products/**, /api/categories/**, /api/banners/**, /api/reviews/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipKeyResolver}"

        # Order Service (Orders, Cart, Wishlist, Coupons)
        - id: order-service
          uri: ${SERVICES_ORDER_URL:http://localhost:8082}
          predicates:
            - Path=/api/orders/**, /api/cart/**, /api/wishlist/**, /api/coupons/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50
                key-resolver: "#{@ipKeyResolver}"

        # Payment Service
        - id: payment-service
          uri: ${SERVICES_PAYMENT_URL:http://localhost:8082}
          predicates:
            - Path=/api/payment/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50
                key-resolver: "#{@ipKeyResolver}"

        # Notification & Chat Service
        - id: notification-service
          uri: ${SERVICES_NOTIFICATION_URL:http://localhost:8082}
          predicates:
            - Path=/api/notifications/**, /api/chat/**, /ws-chat/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50
                key-resolver: "#{@ipKeyResolver}"

        # File Upload Service
        - id: file-service
          uri: ${SERVICES_FILE_URL:http://localhost:8086}
          predicates:
            - Path=/api/files/**, /api/upload/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50
                key-resolver: "#{@ipKeyResolver}"

        # Admin & Statistics Service
        - id: admin-service
          uri: ${SERVICES_ADMIN_URL:http://localhost:8082}
          predicates:
            - Path=/api/admin/**, /api/statistics/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50
                key-resolver: "#{@ipKeyResolver}"

        # Fallback route for all other /api/**
        - id: default-route
          uri: ${SERVICES_MONOLITH_URL:http://localhost:8082}
          predicates:
            - Path=/api/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50
                key-resolver: "#{@ipKeyResolver}"

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.web.reactive.function.client.ExchangeFunctions: INFO
