# Hibernate cấu hình
# Đặt ddl-auto là 'none' vì dự án yêu cầu quản lý cơ sở dữ liệu thủ công qua script SQL riêng
# Việc này đảm bảo Hibernate không tự ý thay đổi cấu trúc bảng, giữ an toàn cho dữ liệu thực tế
