# ============================================================
# CẤU HÌNH DATABASE
# ============================================================
# QUAN TRỌNG: Không hardcode credentials ở đây!
# Đặt các biến môi trường hoặc dùng file .env (đã gitignore)
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/website_application?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ============================================================
# HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================================
# SERVER
# ============================================================
# Port mặc định (Render/Railway tự động cấp qua biến PORT)
server.port=${PORT:8080}

# URL public của BE (dùng để tạo proxy URL cho ảnh)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ============================================================
# OAUTH2 RESOURCE SERVER (KEYCLOAK)
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/ecommerce
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/ecommerce/protocol/openid-connect/certs

# ============================================================
# CORS
# ============================================================
# Danh sách domain được phép gọi API, phân cách bằng dấu phẩy
# Production: CORS_ALLOWED_ORIGINS=https://yourdomain.com,https://www.yourdomain.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ============================================================
# GOOGLE OAUTH
# ============================================================
google.client.id=${GOOGLE_CLIENT_ID}

# ============================================================
# MINIO / BACKBLAZE B2
# ============================================================
# Local: MinIO (localhost:9000)
# Production: Backblaze B2 qua biến môi trường
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket.product=${MINIO_BUCKET_PRODUCT:products-image}
minio.bucket.category=${MINIO_BUCKET_CATEGORY:products-image}
minio.bucket.user=${MINIO_BUCKET_USER:products-image}
minio.bucket.banner=${MINIO_BUCKET_BANNER:products-image}
minio.url.external=${MINIO_EXTERNAL_URL:http://localhost:9000}
minio.region=${MINIO_REGION:us-east-1}

# ============================================================
# VNPAY
# ============================================================
vnp.tmnCode=${VNP_TMN_CODE}
vnp.hashSecret=${VNP_HASH_SECRET}
vnp.payUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnp.returnUrl=${VNP_RETURN_URL:http://localhost:5173/payment-success}

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.max-file-size=4MB
spring.servlet.multipart.max-request-size=4MB

# ============================================================
# KEYCLOAK ADMIN (dùng cho AuthController tự đăng ký)
# ============================================================
keycloak.admin.url=${KEYCLOAK_URL:http://localhost:8180}
keycloak.admin.realm=${KEYCLOAK_REALM:ecommerce}
#keycloak.admin.client-id=${KEYCLOAK_CLIENT_ID:ecommerce-backend}
#keycloak.admin.client-secret=${KEYCLOAK_CLIENT_SECRET:ecommerce-backend-secret-placeholder}
keycloak.admin.username=${KC_ADMIN_USER:admin}
keycloak.admin.password=${KC_ADMIN_PASSWORD:admin_password}
